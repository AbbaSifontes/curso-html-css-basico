<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Web Desarrolador</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alumni+Sans:ital,wght@1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles2.css" />
  </head>
  <body>
    <main>
      <header class="cabecera-perfil">
        <img src="img/avatar.webp" alt="Abba Sifontes" class="avatar" />
        <h1>ABBA DESARROLLADOR</h1>
        <p>Estudiante de Desarrollo Web & Diseñador UI</p>
      </header>
      <section class="enlaces">
        <a href="#" class="caja-enlaces">Mi Portafolio Web</a>
        <a href="#" class="caja-enlaces">Codigo en Github</a>
        <a href="#" class="caja-enlaces">Perfil de Linkedin</a>
      </section>
      <section class="formulario">
        <h2>Escribeme un Mensaje</h2>
        <label for="name">Nombre</label>
        <input
          type="text"
          id="name"
          required
          placeholder="escribe tu nombre"
          autocomplete="off"
        />
        <label for="email">Correo</label>
        <input
          type="email"
          id="email"
          placeholder="escribe tu correo"
          required
          autocomplete="off"
        />
        <textarea
          name="sugerencia"
          id="ayuda"
          placeholder="¿En que puedo ayudate?"
        ></textarea>
        <button type="submit" class="btn">Enviar</button>
      </section>
    </main>
  </body>
</html>
